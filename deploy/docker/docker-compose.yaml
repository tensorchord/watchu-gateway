version: "3.9"

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: watchu
      POSTGRES_USER: watchu
      POSTGRES_PASSWORD: watchu
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchu -d watchu"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql

  gateway:
    build: ../../gateway
    environment:
      ANALYSIS_ENABLED: "true"
      ANALYSIS_TICK_INTERVAL: "5s"
      DATABASE_URL: postgres://watchu:watchu@db:5432/watchu?sslmode=disable
      GIN_MODE: debug
      LOG_LEVEL: debug
      ANALYSIS_MAX_WINDOW: 10m
      PROMPT_INJECTION_ENABLED: true
      PROMPT_INJECTION_API_BASE: ${PROMPT_INJECTION_API_BASE} 
      PROMPT_INJECTION_API_KEY: ${PROMPT_INJECTION_API_KEY} 
      PROMPT_INJECTION_MODEL: ${PROMPT_INJECTION_MODEL} 
      PROMPT_INJECTION_MODE: ${PROMPT_INJECTION_MODE}
      PROMPT_INJECTION_EXTRACT_USER_PROMPT: ${PROMPT_INJECTION_EXTRACT_USER_PROMPT:-true}
      THREAT_INSIGHT_BASE_URL: ${THREAT_INSIGHT_BASE_URL}
      THREAT_INSIGHT_API_KEY: ${THREAT_INSIGHT_API_KEY}
      THREAT_INSIGHT_MODEL: ${THREAT_INSIGHT_MODEL:-gpt-4o-mini}
      THREAT_INSIGHT_TIMEOUT: ${THREAT_INSIGHT_TIMEOUT:-120s}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      target: dev
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_vite_cache:/app/node_modules/.vite
    command: >-
      sh -c "if [ ! -d node_modules ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - gateway
    restart: unless-stopped

  tetragon:
    image: quay.io/cilium/tetragon:v1.6.0
    command:
      - --server-address
      - unix:///var/run/tetragon/tetragon.sock
    pid: "host"
    privileged: true
    security_opt:
      - apparmor=unconfined
    volumes:
      - /sys/kernel/btf/vmlinux:/var/lib/tetragon/btf:ro
      - tetragon-socket:/var/run/tetragon

  collector:
    build: ../../collector
    image: watchu-collector:local
    command:
      - /usr/local/bin/collector
      - --gateway
      - http://gateway:8080
      - --tetragon-path
      - unix:///var/run/tetragon/tetragon.sock
      - --scan-host-proc
    pid: "host"
    uts: "host"
    privileged: true
    security_opt:
      - apparmor=unconfined
    volumes:
      - /proc:/proc
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/kernel/tracing:/sys/kernel/tracing
      - tetragon-socket:/var/run/tetragon
    depends_on:
      - gateway
      - tetragon

volumes:
  pgdata: {}
  frontend_node_modules: {}
  frontend_vite_cache: {}
  tetragon-socket: {}
