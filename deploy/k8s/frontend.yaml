apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: watchu
data:
  VITE_API_BASE_URL: "http://gateway:8080/api/v1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: watchu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: watchu-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5173
          name: http
        envFrom:
        - configMapRef:
            name: frontend-config
        livenessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: watchu
spec:
  selector:
    app: frontend
  ports:
  - port: 5173
    targetPort: 5173
    name: http
  type: ClusterIP
