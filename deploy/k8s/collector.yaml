apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: collector
  namespace: watchu
  labels:
    app: collector
spec:
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: tetragon
        image: quay.io/cilium/tetragon:v1.6.0
        args:
        - --server-address
        - unix:///var/run/tetragon/tetragon.sock
        securityContext:
          privileged: true
        volumeMounts:
        - name: btf
          mountPath: /var/lib/tetragon/btf
          readOnly: true
        - name: tetragon-socket
          mountPath: /var/run/tetragon
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      - name: collector
        image: ghcr.io/tensorchord/watchu-collector:v0.1.0
        imagePullPolicy: IfNotPresent
        command: ["/usr/local/bin/collector"]
        args:
        - "--gateway"
        - "http://gateway.watchu.svc.cluster.local:8080"
        - "--tetragon-socket"
        - "unix:///var/run/tetragon/tetragon.sock"
        securityContext:
          privileged: true
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        # Mount /proc to access process information
        - name: proc
          mountPath: /host/proc
          readOnly: true
        # Mount /sys/fs/cgroup to list container pids
        - name: cgroup
          mountPath: /host/sys/fs/cgroup
          readOnly: true
        # Mount Tetragon socket to receive events
        - name: tetragon-socket
          mountPath: /var/run/tetragon
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: proc
        hostPath:
          path: /proc
          type: Directory
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
          type: Directory
      - name: btf
        hostPath:
          path: /sys/kernel/btf/vmlinux
          type: File
      - name: tetragon-socket
        emptyDir: {}
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
      serviceAccountName: collector
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: collector
  namespace: watchu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collector
rules:
- apiGroups: [""]
  resources: ["pods", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collector
subjects:
- kind: ServiceAccount
  name: collector
  namespace: watchu
