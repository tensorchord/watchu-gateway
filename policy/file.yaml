# https://www.man7.org/linux/man-pages/man2/openat.2.html
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "open"
spec:
  tracepoints:
  - subsystem: "syscalls"
    event: "sys_enter_openat"
    args:
      - index: 1 # filename
        type: "char_buf"
      - index: 2 # flags
        type: "uint64"
      - index: 3 # mode
        type: "uint64"
  - subsystem: "syscalls"
    event: "sys_enter_openat2"
    args:
      - index: 1 # filename
        type: "char_buf"
      - index: 3 # usize
        type: "uint64"
  - subsystem: "syscalls"
    event: "sys_enter_creat"
    args:
      - index: 0 # filename
        type: "char_buf"
      - index: 1 # mode
        type: "uint64"
  - subsystem: "syscalls"
    event: "sys_enter_open"
    args:
      - index: 0 # filename
        type: "char_buf"
      - index: 1 # flags
        type: "uint64"
      - index: 2 # mode
        type: "uint64"
