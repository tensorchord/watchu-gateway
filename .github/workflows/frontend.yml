name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/frontend.yml'
      - 'frontend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/frontend.yml'
      - 'frontend/**'
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
