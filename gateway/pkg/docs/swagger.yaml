      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        required: true
        type: string
      - description: RFC3339 timestamp upper bound (defaults to now)
        in: query
        name: until
        type: string
      - description: Maximum number of records
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_httpapi.CorrelationSummaryResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List correlation summaries
      tags:
      - analytics
  /api/v1/analysis/heuristic_alerts:
    get:
      description: Returns heuristic alerts for a host since the provided timestamp.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        required: true
        type: string
      - description: RFC3339 timestamp upper bound (defaults to now)
        in: query
        name: until
        type: string
      - description: Maximum number of records
        in: query
        maximum: 1000
        minimum: 1
        name: limit
