      tags:
      - analytics
  /api/v1/analysis/process_tree:
    get:
      description: Returns a hierarchical process tree for the most recent roots on
        a host.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: Specific root PID to expand
        in: query
        name: root_pid
        type: string
      - description: Specific root exec id to expand
        in: query
        name: root_exec_id
        type: string
      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        type: string
      - description: RFC3339 timestamp upper bound
        in: query
        name: until
        type: string
      - description: Maximum unique roots
        in: query
        maximum: 2000
        minimum: 1
        name: root_limit
        type: integer
      - description: Maximum nodes returned
        in: query
        maximum: 2000
        minimum: 1
        name: node_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
