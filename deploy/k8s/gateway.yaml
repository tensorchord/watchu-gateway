apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: watchu
data:
  DATABASE_URL: "postgres://watchu:watchu@postgres:5432/watchu?sslmode=disable"
  PROMPT_INJECTION_ENABLED: "true"
  # Set these environment variables via Secret or external configuration
  # PROMPT_INJECTION_API_BASE: ""
  # PROMPT_INJECTION_API_KEY: ""
  # PROMPT_INJECTION_MODEL: ""
  # PROMPT_INJECTION_MODE: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: watchu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: watchu-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: gateway-config
        env:
        # Uncomment and set via Secret for production
        # - name: PROMPT_INJECTION_API_BASE
        #   valueFrom:
        #     secretKeyRef:
        #       name: gateway-secrets
        #       key: api-base
        # - name: PROMPT_INJECTION_API_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: gateway-secrets
        #       key: api-key
        # - name: PROMPT_INJECTION_MODEL
        #   valueFrom:
        #     secretKeyRef:
        #       name: gateway-secrets
        #       key: model
        # - name: PROMPT_INJECTION_MODE
        #   valueFrom:
        #     secretKeyRef:
        #       name: gateway-secrets
        #       key: mode
        - name: HOST_GATEWAY_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: watchu
spec:
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
