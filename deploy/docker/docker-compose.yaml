services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: watchu
      POSTGRES_USER: watchu
      POSTGRES_PASSWORD: watchu
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchu"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql

  gateway:
    build: ../../gateway
    image: watchu-gateway:local
    environment:
      ANALYSIS_ENABLED: "true"
      ANALYSIS_TICK_INTERVAL: "5s"
      DATABASE_URL: postgres://watchu:watchu@db:5432/watchu?sslmode=disable
      GIN_MODE: debug
      LOG_LEVEL: debug
      ANALYSIS_MAX_WINDOW: 10m
      PROMPT_INJECTION_ENABLED: true
      PROMPT_INJECTION_API_BASE: ${PROMPT_INJECTION_API_BASE}
      PROMPT_INJECTION_API_KEY: ${PROMPT_INJECTION_API_KEY}
      PROMPT_INJECTION_MODEL: ${PROMPT_INJECTION_MODEL}
      PROMPT_INJECTION_MODE: ${PROMPT_INJECTION_MODE}
      PROMPT_INJECTION_EXTRACT_USER_PROMPT: ${PROMPT_INJECTION_EXTRACT_USER_PROMPT:-true}
      THREAT_INSIGHT_BASE_URL: ${THREAT_INSIGHT_BASE_URL}
      THREAT_INSIGHT_API_KEY: ${THREAT_INSIGHT_API_KEY}
      THREAT_INSIGHT_MODEL: ${THREAT_INSIGHT_MODEL:-gpt-4o-mini}
      THREAT_INSIGHT_TIMEOUT: ${THREAT_INSIGHT_TIMEOUT:-120s}
      SKILL_RUNNER_BASE_URL: ${SKILL_RUNNER_BASE_URL}
      SKILL_UPLOAD_DIR: /tmp/watchu-skill-uploads
      S3_BUCKET: ${S3_BUCKET:-skill-security-artifacts}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "8080:8080"
    volumes:
      - /tmp/watchu-skill-uploads:/tmp/watchu-skill-uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: watchu-frontend:local
    build:
      context: ../../frontend
      target: dev
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_vite_cache:/app/node_modules/.vite
    command: >-
      sh -c "if [ ! -d node_modules ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - gateway
    restart: unless-stopped

  tetragon:
    # Custom built image with environment variable support
    # Build: cd deploy/docker && ./build-tetragon.sh
    image: watchu-tetragon:local
    build:
      context: .
      dockerfile: tetragon.Dockerfile
    command:
      - --server-address
      - unix:///var/run/tetragon/tetragon.sock
      - --enable-process-environment-variables
      - --filter-environment-variables=WATCHU_CORRELATION_ID
    pid: "host"
    privileged: true
    security_opt:
      - apparmor=unconfined
    volumes:
      - /sys/kernel/btf/vmlinux:/var/lib/tetragon/btf:ro
      - tetragon-socket:/var/run/tetragon

  collector:
    build: ../../collector
    image: watchu-collector:local
    command:
      - /usr/local/bin/collector
      - --gateway
      - http://gateway:8080
      - --tetragon-path
      - unix:///var/run/tetragon/tetragon.sock
      # - --scan-host-proc
      #- --ssl-path
      #- ${COLLECTOR_SSL_PATH:-/home/xieyuandong/.nvm/versions/node/v24.10.0/bin/node}
    pid: "host"
    uts: "host"
    privileged: true
    security_opt:
      - apparmor=unconfined
    volumes:
      - /proc:/proc
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/kernel/tracing:/sys/kernel/tracing
      - tetragon-socket:/var/run/tetragon
      #- /home/xieyuandong/.nvm:/home/xieyuandong/.nvm:ro
    depends_on:
      - gateway
      - tetragon

  runner:
    build:
      context: ../..
      dockerfile: skill-runner/Dockerfile
    image: watchu-runner:local
    environment:
      SKILL_RUNNER_ADDR: :8091
      SKILL_RUNNER_EXEC_TIMEOUT: 30m
      SKILL_RUNNER_LLM_BASE_URL: ${SKILL_RUNNER_LLM_BASE_URL}
      SKILL_RUNNER_LLM_API_KEY: ${SKILL_RUNNER_LLM_API_KEY}
      SKILL_RUNNER_WORKSPACE_BASE_DIR: /tmp/watchu-skill-workspaces
      # Docker group GID for socket access (get with: getent group docker | cut -d: -f3)
      DOCKER_GID: ${DOCKER_GID:-984}
      # Claude Code agent configuration
      CLAUDE_CODE_DOCKER_IMAGE: ${CLAUDE_CODE_DOCKER_IMAGE:-ghcr.io/tensorchord/watchu-claude-code-agent:latest}
      CLAUDE_CODE_DOCKER_COMMAND: ${CLAUDE_CODE_DOCKER_COMMAND:-claude --dangerously-skip-permissions --output-format stream-json --verbose -p}
      CLAUDE_CODE_LOCAL_CMD: ${CLAUDE_CODE_LOCAL_CMD:-claude --dangerously-skip-permissions --output-format stream-json --verbose -p}
      CLAUDE_CODE_PASS_ENV_VARS: ${CLAUDE_CODE_PASS_ENV_VARS:-ANTHROPIC_BASE_URL=https://open.bigmodel.cn/api/anthropic,ANTHROPIC_AUTH_TOKEN,API_TIMEOUT_MS=3000000,CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1,ANTHROPIC_DEFAULT_OPUS_MODEL=GLM-4.7,ANTHROPIC_DEFAULT_SONNET_MODEL=GLM-4.7,ANTHROPIC_DEFAULT_HAIKU_MODEL=GLM-4.5-Air}
      # Generic agent configuration (used for other agent types)
      # Format: {AGENT_TYPE}_DOCKER_IMAGE, {AGENT_TYPE}_DOCKER_COMMAND, {AGENT_TYPE}_LOCAL_CMD, {AGENT_TYPE}_PASS_ENV_VARS
      # S3 configuration for downloading artifacts directly
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    # Command to run (passed to entrypoint script)
    command: ["/usr/local/bin/skill-runner"]
    ports:
      - "8091:8091"
    volumes:
      - /tmp/watchu-skill-uploads:/tmp/watchu-skill-uploads
      - /tmp/watchu-skill-workspaces:/tmp/watchu-skill-workspaces
      # Mount Docker socket for Docker-outside-of-Docker (DooD)
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - gateway

volumes:
  pgdata: {}
  frontend_node_modules: {}
  frontend_vite_cache: {}
  tetragon-socket: {}
