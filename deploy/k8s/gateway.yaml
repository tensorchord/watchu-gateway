apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: watchu
data:
  DATABASE_URL: "postgres://watchu:watchu@postgres:5432/watchu?sslmode=disable"
  GIN_MODE: "release"
  LOG_LEVEL: "info"
  PROMPT_INJECTION_ENABLED: "true"
  PROMPT_INJECTION_EXTRACT_USER_PROMPT: "true"
  PROMPT_INJECTION_API_BASE: "http://host.docker.internal:4000"
  PROMPT_INJECTION_API_KEY: "your-api-key"
  PROMPT_INJECTION_MODEL: "gpt-4o"
  PROMPT_INJECTION_MODE: "prompt_based"
  THREAT_INSIGHT_BASE_URL: "http://host.docker.internal:4000"
  THREAT_INSIGHT_API_KEY: "your-api-key"
  THREAT_INSIGHT_MODEL: "gpt-4o-mini"
  THREAT_INSIGHT_TIMEOUT: "120s"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: watchu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/tensorchord/watchu-gateway:v0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: gateway-config
        env:
        - name: HOST_GATEWAY_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: watchu
spec:
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
