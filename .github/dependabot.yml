version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "collector/"
    schedule:
      interval: "monthly"
    groups:
      collector-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps:collector)"
    assignees:
      - "kemingy"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "gomod"
    directory: "gateway/"
    schedule:
      interval: "monthly"
    groups:
      gateway-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps:gateway)"
    assignees:
      - "xieydd"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "npm"
    directory: "frontend/"
    schedule:
      interval: "monthly"
    groups:
      root-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps:frontend)"
    assignees:
      - "xieydd"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(actions)"
    assignees:
      - "kemingy"
    cooldown:
      default-days: 7
