info:
  contact: {}
paths:
  /api/v1/analysis/correlation_summaries:
    get:
      description: Returns correlation summaries for a host since the provided timestamp.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        required: true
        type: string
      - description: Maximum number of records
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_httpapi.CorrelationSummaryResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List correlation summaries
      tags:
      - analytics
  /api/v1/analysis/heuristic_alerts:
    get:
      description: Returns heuristic alerts for a host since the provided timestamp.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        required: true
        type: string
      - description: Maximum number of records
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_httpapi.HeuristicAlertResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List heuristic alerts
      tags:
      - analytics
  /api/v1/analysis/process_events:
    get:
      description: Returns individual lifecycle events for a host since the provided
        timestamp.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        required: true
        type: string
      - description: Maximum number of records
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_httpapi.ProcessEventResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List process lifecycle events
      tags:
      - analytics
  /api/v1/analysis/process_http_events:
    get:
      description: Returns process HTTP events for a host since the provided timestamp.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        required: true
        type: string
      - description: Maximum number of records
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_httpapi.ProcessHTTPEventResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List process HTTP events
      tags:
      - analytics
  /api/v1/analysis/process_summary/{root_pid}:
    get:
      description: Returns aggregated metadata and recent alerts for a specific process
        root.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: Root PID
        in: path
        name: root_pid
        required: true
        type: string
      - description: Root exec ID
        in: query
        name: root_exec_id
        type: string
      - description: Maximum alerts
        in: query
        maximum: 1000
        minimum: 1
        name: alerts_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_httpapi.ProcessSummaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: Summarize a process root
      tags:
      - analytics
  /api/v1/analysis/process_tree:
    get:
      description: Returns a hierarchical process tree for the most recent roots on
        a host.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: Specific root PID to expand
        in: query
        name: root_pid
        type: string
      - description: Specific root exec id to expand
        in: query
        name: root_exec_id
        type: string
      - description: Maximum unique roots
        in: query
        maximum: 100
        minimum: 1
        name: root_limit
        type: integer
      - description: Maximum nodes returned
        in: query
        maximum: 2000
        minimum: 1
        name: node_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_httpapi.ProcessTreeNodeResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List process tree
      tags:
      - analytics
  /api/v1/analysis/prompt_injections/{request_id}:
    get:
      description: Returns the HTTP request payload associated with a prompt injection
        request ID.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: Prompt injection request UUID
        in: path
        name: request_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_httpapi.HTTPRequestDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: Get stored HTTP request for a prompt injection
      tags:
      - analytics
  /api/v1/analysis/security_llm_analysis:
    get:
      description: Returns LLM security analysis records and prompt injection summaries
        for a host.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: Maximum semantic records
        in: query
        maximum: 500
        minimum: 1
        name: semantic_limit
        type: integer
      - description: Maximum prompt injection records
        in: query
        maximum: 500
        minimum: 1
        name: prompt_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_httpapi.SecurityLLMAnalysisResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List security semantic and prompt injection analysis
      tags:
      - analytics
  /api/v1/ingest/exec_event:
    post:
      consumes:
      - application/json
      description: Accepts a batch of process execution telemetry events for bulk
        ingestion.
      parameters:
      - description: Exec event batch
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/pkg_httpapi.ExecEventBatch'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: Ingest exec events
      tags:
      - ingest
  /api/v1/ingest/http_request:
    post:
      consumes:
      - application/json
      description: Accepts a batch of HTTP request telemetry events for bulk ingestion.
      parameters:
      - description: HTTP request batch
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/pkg_httpapi.HTTPRequestBatch'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: Ingest HTTP request events
      tags:
      - ingest
  /api/v1/ingest/http_response:
    post:
      consumes:
      - application/json
      description: Accepts a batch of HTTP response telemetry events for bulk ingestion.
      parameters:
      - description: HTTP response batch
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/pkg_httpapi.HTTPResponseBatch'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: Ingest HTTP response events
      tags:
      - ingest
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_httpapi.HealthResponse'
      summary: Health check
      tags:
      - health
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_httpapi.HealthResponse'
      summary: Readiness check
      tags:
      - health
swagger: "2.0"
