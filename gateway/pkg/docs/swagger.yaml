info:
  contact: {}
paths:
  /api/v1/analysis/agent_runs:
    get:
      description: Returns agent runs detected for a host within the requested window.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: RFC3339 timestamp lower bound
        in: query
        name: since
        required: true
        type: string
      - description: RFC3339 timestamp upper bound (defaults to now)
        in: query
        name: until
        type: string
      - description: Maximum number of records
        in: query
        maximum: 1000
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_httpapi.AgentRunResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: List agent runs
      tags:
      - analytics
  /api/v1/analysis/agent_runs/{agent_run_id}/traces:
    get:
      description: Returns trace nodes plus contextual payloads for a specific agent
        run.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: Agent run ID
        in: path
        name: agent_run_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_httpapi.TraceGraphResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_httpapi.ErrorResponse'
      summary: Retrieve traces for an agent run
      tags:
      - analytics
  /api/v1/analysis/correlation_summaries:
    get:
      description: Returns correlation summaries for a host since the provided timestamp.
      parameters:
      - description: Target host
        in: query
        name: host
        required: true
