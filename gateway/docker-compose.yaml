version: "3.9"

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: watchu
      POSTGRES_USER: watchu
      POSTGRES_PASSWORD: watchu
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchu -d watchu"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d

  gateway:
    build: .
    environment:
      DATABASE_URL: postgres://watchu:watchu@db:5432/watchu?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: {}
