      parameters:
      - description: Target host
        in: query
        name: host
        required: true
        type: string
      - description: Root PID
        in: path
        name: root_pid
        required: true
        type: string
      - description: Root exec ID
        in: query
        name: root_exec_id
        type: string
      - description: Maximum alerts
        in: query
        maximum: 1000
        minimum: 1
        name: alerts_limit
        type: integer
      produces:
