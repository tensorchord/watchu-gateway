apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tetragon
  namespace: watchu
  labels:
    app: tetragon
spec:
  selector:
    matchLabels:
      app: tetragon
  template:
    metadata:
      labels:
        app: tetragon
    spec:
      hostPID: true
      hostNetwork: true
      containers:
      - name: tetragon
        image: quay.io/cilium/tetragon:v1.6.0
        args:
        - --server-address
        - unix:///var/run/tetragon/tetragon.sock
        securityContext:
          privileged: true
        volumeMounts:
        - name: btf
          mountPath: /var/lib/tetragon/btf
          readOnly: true
        - name: tetragon-socket
          mountPath: /var/run/tetragon
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: btf
        hostPath:
          path: /sys/kernel/btf/vmlinux
          type: File
      - name: tetragon-socket
        hostPath:
          path: /var/run/tetragon
          type: DirectoryOrCreate
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
